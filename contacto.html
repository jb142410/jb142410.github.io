<section class="section">
  <h2>Contacto</h2>

 <form class="form" id="formulario" action="https://formspree.io/f/mdabgavj" method="POST">

  <div class="input-group">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <span class="error">Nombre requerido</span>
  </div>

  <div class="input-group">
    <input type="email" name="correo" placeholder="Correo" required>
    <span class="error">Correo válido requerido</span>
  </div>

  <div class="input-group">
    <input type="tel" name="telefono" placeholder="Teléfono" required>
    <span class="error">Teléfono requerido</span>
  </div>

  <div class="input-group">
    <textarea name="mensaje" placeholder="Mensaje" required></textarea>
    <span class="error">Mensaje requerido</span>
  </div>

  <button type="submit" class="btn-pro">Enviar</button>

  <!-- MENSAJE -->
  <p id="mensaje-exito" class="exito">✔ Mensaje enviado correctamente</p>

</form>
